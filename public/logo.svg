<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" fill="none">
  <defs>
    <!-- Vibrant mint-to-cyan gradient matching official logo -->
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3ce1b0" />
      <stop offset="100%" stop-color="#11b3d7" />
    </linearGradient>

    <!-- Deep computer screen background gradient -->
    <linearGradient id="screenGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a4d68" />
      <stop offset="50%" stop-color="#088395" />
      <stop offset="100%" stop-color="#05b292" />
    </linearGradient>

    <!-- Glow Filter for Premium Depth -->
    <filter id="logoGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g id="logo-text-ring">
    <!-- Circular Text Path for DAKSH COMPUTERS (Top Arc, clockwise Left to Right) -->
    <path id="textPathTop" d="M 65,250 A 185,185 0 0,1 435,250" fill="none" stroke="transparent" />
    <text fill="url(#logoGradient)" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="36" letter-spacing="6">
      <textPath href="#textPathTop" startOffset="50%" text-anchor="middle">DAKSH COMPUTERS</textPath>
    </text>

    <!-- Circular Text Path for WE TRUST IN QUALITY EDUCATION (Bottom Arc, clockwise Right to Left) -->
    <path id="textPathBottom" d="M 435,250 A 185,185 0 0,1 65,250" fill="none" stroke="transparent" />
    <text fill="url(#logoGradient)" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="18.5" letter-spacing="2.5">
      <textPath href="#textPathBottom" startOffset="50%" text-anchor="middle">WE TRUST IN QUALITY EDUCATION</textPath>
    </text>

    <!-- Decorative Stars Separating Top & Bottom Texts -->
    <g transform="translate(68, 252) scale(1.6)" fill="url(#logoGradient)">
      <polygon points="0,-10 3,-3 10,-3 5,1 7,8 0,4 -7,8 -5,1 -10,-3 -3,-3" />
    </g>

    <g transform="translate(432, 252) scale(1.6)" fill="url(#logoGradient)">
      <polygon points="0,-10 3,-3 10,-3 5,1 7,8 0,4 -7,8 -5,1 -10,-3 -3,-3" />
    </g>
  </g>

  <g id="emblem-group" style="transform-origin: 250px 250px;">
    <!-- 1. Behind portion of the Orbital Swoosh -->
    <path d="M 120,240 A 155,58 0 0,1 380,240" fill="none" stroke="url(#logoGradient)" stroke-width="11" stroke-linecap="round" transform="rotate(-26, 250, 240)" opacity="0.85" />

    <!-- 2. Computer Monitor -->
    <g transform="translate(242, 245) rotate(-6.5)" style="transform-origin: 0 0;">
      <path d="M -22,58 L -12,102 L 12,102 L 22,58 Z" fill="url(#logoGradient)" opacity="0.9" />
      <ellipse cx="0" cy="102" rx="45" ry="10" fill="url(#logoGradient)" />
      <rect x="-106" y="-74" width="212" height="136" rx="14" fill="#03202b" stroke="url(#logoGradient)" stroke-width="5" />
      <rect x="-96" y="-64" width="192" height="116" rx="8" fill="url(#screenGradient)" />
      <path d="M -96,-64 L 40,-64 L -30,52 L -96,52 Z" fill="white" opacity="0.06" />
      <rect x="-80" y="-45" width="12" height="12" fill="#03202b" opacity="0.3" rx="2" />
      <rect x="-80" y="-25" width="28" height="6" fill="#03202b" opacity="0.3" rx="1" />
      <rect x="-45" y="-45" width="20" height="6" fill="#03202b" opacity="0.3" rx="1" />
    </g>

    <!-- 3. Front portion of the Orbital Swoosh -->
    <path d="M 380,240 A 155,58 0 0,1 120,240" fill="none" stroke="url(#logoGradient)" stroke-width="11" stroke-linecap="round" transform="rotate(-26, 250, 240)" style="filter: url(#logoGlow);" />

    <!-- 4. Digital Floating Pixel Particles -->
    <g id="flying-pixels">
      <rect x="326" y="172" width="14" height="14" fill="url(#logoGradient)" rx="2.5" />
      <rect x="346" y="198" width="10" height="10" fill="url(#logoGradient)" rx="2" />
      <rect x="312" y="218" width="12" height="12" fill="url(#logoGradient)" rx="2.5" />
      <rect x="332" y="238" width="16" height="16" fill="url(#logoGradient)" rx="3" />
      <rect x="356" y="226" width="8" height="8" fill="url(#logoGradient)" rx="1.5" />
      <rect x="328" y="262" width="11" height="11" fill="url(#logoGradient)" rx="2" />
    </g>
  </g>
</svg>
